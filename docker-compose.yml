services:
  bridge:
    build: .
    restart: unless-stopped
    env_file: .env
    labels:
      - "traefik.http.services.bridge.loadbalancer.server.port=8443"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-bridge}:${POSTGRES_PASSWORD:-bridge}@postgres:5432/${POSTGRES_DB:-bridge}?sslmode=disable
      TG_API_URL: http://telegram-bot-api:8081
    depends_on:
      postgres:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: 1
    volumes:
      - tg-api-data:/var/lib/telegram-bot-api
    ports:
      - "8081:8081"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bridge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bridge}
      POSTGRES_DB: ${POSTGRES_DB:-bridge}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bridge}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  tg-api-data:
